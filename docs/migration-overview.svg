<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 920" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <style>
    .box { rx: 8; stroke-width: 2; }
    .raw { fill: #fdecea; stroke: #c0392b; }
    .safe { fill: #e8f5e9; stroke: #2e7d32; }
    .tool { fill: #e3f2fd; stroke: #1565c0; }
    .ext  { fill: #f3e5f5; stroke: #6a1b9a; }
    .plain{ fill: #ffffff; stroke: #555555; }
    .zone { fill: #fafafa; stroke: #9e9e9e; stroke-dasharray: 6 4; rx: 12; }
    .zonesafe { fill: #f1f8f1; stroke: #2e7d32; stroke-dasharray: 6 4; rx: 12; }
    .t  { font-size: 13px; fill: #222; }
    .tb { font-size: 14px; font-weight: bold; fill: #222; }
    .ts { font-size: 11.5px; fill: #555; }
    .lbl{ font-size: 11.5px; fill: #444; font-style: italic; }
    .zl { font-size: 12px; font-weight: bold; fill: #777; }
    .arrow { stroke: #444; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 7 5; }
  </style>

  <!-- Title -->
  <text x="30" y="38" font-size="22" font-weight="bold" fill="#111">silo-migrate — forum dump ➜ Discourse-ready intermediate.db</text>
  <text x="30" y="60" class="ts">Throwaway Docker workbench for migrations. Red = raw customer data (never leaves the migration zone) · Green = AI-safe artifacts · Purple = outside this tool</text>

  <!-- ===== Row A: host ===== -->
  <rect class="box plain" x="20" y="90" width="180" height="60"/>
  <text x="110" y="115" text-anchor="middle" class="tb">👷 Migration</text>
  <text x="110" y="133" text-anchor="middle" class="tb">Engineer</text>

  <rect class="box tool" x="250" y="80" width="250" height="80"/>
  <text x="375" y="108" text-anchor="middle" class="tb">silo-migrate CLI</text>
  <text x="375" y="126" text-anchor="middle" class="ts">guided interactive mode</text>
  <text x="375" y="141" text-anchor="middle" class="ts">or standalone commands · doctor</text>

  <rect class="box raw" x="560" y="80" width="260" height="80"/>
  <text x="690" y="105" text-anchor="middle" class="tb">Project directory</text>
  <text x="690" y="123" text-anchor="middle" class="ts">&lt;base&gt;/customers/acme/</text>
  <text x="690" y="139" text-anchor="middle" class="ts">config.env · compose · dumps/ · output/</text>

  <rect class="box raw" x="900" y="80" width="260" height="80"/>
  <text x="1030" y="105" text-anchor="middle" class="tb">📦 Customer dump</text>
  <text x="1030" y="123" text-anchor="middle" class="ts">.sql · .sql.gz · tar · mysqldump XML</text>
  <text x="1030" y="139" text-anchor="middle" class="ts">(gzip integrity verified)</text>

  <line class="arrow" x1="200" y1="120" x2="246" y2="120"/>
  <line class="arrow" x1="500" y1="120" x2="556" y2="120"/>
  <text x="528" y="111" text-anchor="middle" class="lbl">manages</text>
  <line class="arrow" x1="900" y1="120" x2="824" y2="120"/>
  <text x="862" y="111" text-anchor="middle" class="lbl">stage-dump /</text>
  <text x="862" y="135" text-anchor="middle" class="lbl">convert-xml</text>

  <!-- ===== Docker zone ===== -->
  <rect class="zone" x="30" y="270" width="920" height="240"/>
  <text x="50" y="294" class="zl">DOCKER · migration_network — throwaway workbench, never production</text>

  <rect class="box raw" x="60" y="320" width="240" height="120"/>
  <text x="180" y="348" text-anchor="middle" class="tb">🛢 Initial DB container</text>
  <text x="180" y="368" text-anchor="middle" class="ts">acme_initial_mariadb</text>
  <text x="180" y="384" text-anchor="middle" class="ts">mariadb 10.11 / mysql 8 / postgres 15</text>
  <text x="180" y="400" text-anchor="middle" class="ts">healthcheck · utf8mb4 · 127.0.0.1 only</text>
  <text x="180" y="424" text-anchor="middle" class="ts">reset anytime: replace-dump</text>

  <rect class="box raw" x="390" y="320" width="240" height="120"/>
  <text x="510" y="348" text-anchor="middle" class="tb">⚙️ Converter container</text>
  <text x="510" y="368" text-anchor="middle" class="ts">acme_converter</text>
  <text x="510" y="384" text-anchor="middle" class="ts">discourse-converters (cloned as-is)</text>
  <text x="510" y="404" text-anchor="middle" class="ts">/converter-settings mounted read-only</text>

  <rect class="box raw" x="710" y="320" width="210" height="120"/>
  <text x="815" y="348" text-anchor="middle" class="tb">🛢 Final DB container</text>
  <text x="815" y="368" text-anchor="middle" class="ts">(optional)</text>
  <text x="815" y="384" text-anchor="middle" class="ts">add-final-db</text>

  <!-- host -> docker arrows -->
  <path class="arrow" d="M 620 160 C 500 230, 280 250, 195 316"/>
  <text x="330" y="245" class="lbl">import-dump — streamed, waits for health, turbo mode, recovery steps on failure</text>
  <path class="arrow" d="M 400 160 C 430 220, 470 260, 500 316"/>
  <text x="408" y="200" class="lbl">run-converter TYPE</text>
  <text x="408" y="215" class="lbl">+ generated --settings</text>
  <line class="arrow" x1="390" y1="380" x2="304" y2="380"/>
  <text x="347" y="370" text-anchor="middle" class="lbl">reads source</text>
  <text x="347" y="398" text-anchor="middle" class="lbl">container DNS :3306</text>

  <!-- ===== Row C: outputs ===== -->
  <rect class="box safe" x="60" y="580" width="240" height="80"/>
  <text x="180" y="608" text-anchor="middle" class="tb">Schema bundle</text>
  <text x="180" y="626" text-anchor="middle" class="ts">schema bundle — structure only,</text>
  <text x="180" y="641" text-anchor="middle" class="ts">no rows (AI-safe)</text>

  <rect class="box raw" x="390" y="580" width="240" height="80"/>
  <text x="510" y="608" text-anchor="middle" class="tb">🗃 output/intermediate.db</text>
  <text x="510" y="626" text-anchor="middle" class="ts">converter result (raw data)</text>
  <text x="510" y="641" text-anchor="middle" class="ts">read-only summarized by the CLI</text>

  <rect class="box ext" x="1000" y="580" width="290" height="80"/>
  <text x="1145" y="608" text-anchor="middle" class="tb">🚀 Discourse</text>
  <text x="1145" y="626" text-anchor="middle" class="ts">script/bulk_import/generic_bulk.rb</text>
  <text x="1145" y="641" text-anchor="middle" class="ts">final import — outside this tool</text>

  <line class="arrow" x1="180" y1="440" x2="180" y2="576"/>
  <text x="190" y="540" class="lbl">schema only</text>
  <line class="arrow" x1="510" y1="440" x2="510" y2="576"/>
  <text x="520" y="540" class="lbl">writes</text>
  <line class="arrow dashed" x1="630" y1="620" x2="996" y2="620"/>
  <text x="812" y="610" text-anchor="middle" class="lbl">hand off when conversion looks right</text>

  <!-- ===== Safe AI zone ===== -->
  <rect class="zonesafe" x="30" y="710" width="1260" height="170"/>
  <text x="50" y="734" class="zl" fill="#2e7d32">NORMAL DEV AI ZONE — redacted or synthetic only; never raw rows, dumps, or credentials</text>

  <rect class="box safe" x="60" y="755" width="270" height="90"/>
  <text x="195" y="783" text-anchor="middle" class="tb">Redacted log + summary</text>
  <text x="195" y="801" text-anchor="middle" class="ts">run-converter --redacted-logs</text>
  <text x="195" y="816" text-anchor="middle" class="ts">or: converter summary</text>

  <rect class="box safe" x="400" y="755" width="220" height="90"/>
  <text x="510" y="783" text-anchor="middle" class="tb">Findings</text>
  <text x="510" y="801" text-anchor="middle" class="ts">findings generate</text>
  <text x="510" y="816" text-anchor="middle" class="ts">visibility: safe / restricted</text>

  <rect class="box safe" x="690" y="755" width="240" height="90"/>
  <text x="810" y="783" text-anchor="middle" class="tb">Synthetic fixtures</text>
  <text x="810" y="801" text-anchor="middle" class="ts">fixtures generate</text>
  <text x="810" y="816" text-anchor="middle" class="ts">shape-only, no real values</text>

  <rect class="box safe" x="1000" y="755" width="260" height="90"/>
  <text x="1130" y="783" text-anchor="middle" class="tb">Safe AI workspace</text>
  <text x="1130" y="801" text-anchor="middle" class="ts">ai prepare / ai refresh</text>
  <text x="1130" y="816" text-anchor="middle" class="ts">for converter-dev AI agents</text>

  <path class="arrow" d="M 450 660 C 380 700, 300 720, 230 751"/>
  <text x="290" y="712" class="lbl">redaction</text>
  <line class="arrow" x1="330" y1="800" x2="396" y2="800"/>
  <line class="arrow" x1="620" y1="800" x2="686" y2="800"/>
  <line class="arrow" x1="930" y1="800" x2="996" y2="800"/>
  <path class="arrow" d="M 180 660 C 180 690, 180 700, 185 706"/>

  <!-- Footnote -->
  <text x="30" y="908" class="ts">Restricted/raw access goes through the audited «trusted inspect / review / redact» workflow instead. When anything misbehaves: bin/silo-migrate doctor.</text>
</svg>
